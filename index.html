<!DOCTYPE html>
<html>

<head>

<title>CPW Scan Ordering</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
text-align:center;
padding:30px;
background:#f4f4f4;
}

h1{
color:#333;
}

button{
padding:20px;
font-size:18px;
background:black;
color:white;
border:none;
border-radius:8px;
margin-top:20px;
}

input{
padding:12px;
font-size:18px;
width:220px;
margin-top:15px;
}

#reader{
width:300px;
margin:auto;
margin-top:20px;
}

</style>

</head>

<body>

<h1>CPW Scan Ordering</h1>

<p>Scan product barcode</p>

<div id="reader"></div>

<input type="text" id="barcode" placeholder="Barcode">

<br>

<input type="number" id="qty" placeholder="Quantity">

<br>

<button onclick="submitOrder()">Submit Order</button>

<script>

function onScanSuccess(decodedText){

document.getElementById("barcode").value = decodedText

}

function submitOrder(){

let barcode = document.getElementById("barcode").value
let qty = document.getElementById("qty").value

alert(
"Order submitted\n\nBarcode: " + barcode + "\nQty: " + qty
)

}

const html5QrCode = new Html5Qrcode("reader")

Html5Qrcode.getCameras().then(devices => {

if (devices && devices.length) {

let rearCamera = devices.find(device =>
device.label.toLowerCase().includes("back") ||
device.label.toLowerCase().includes("rear")
)

let cameraId = rearCamera ? rearCamera.id : devices[0].id

html5QrCode.start(
cameraId,
{
fps:10,
qrbox:250
},
onScanSuccess
)

}

}).catch(err => {

console.log("Camera error", err)

})

</script>

</body>

</html>
